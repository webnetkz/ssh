<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Privacy Scanner</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="card">
      <header class="header">
        <h1>Privacy Scanner</h1>
        <p class="subtitle">Page tracking scanner</p>
      </header>

      <section class="score">
        <div class="score-label">Privacy score</div>
        <div id="scoreValue" class="score-value">--</div>
        <div id="scoreStatus" class="badge">--</div>
      </section>

      <section class="stats">
        <div class="stat">
          <span>Trackers:</span>
          <strong id="trackerCount">0</strong>
        </div>
        <div class="stat">
          <span>Cookies:</span>
          <strong id="cookieCount">0</strong>
        </div>
      </section>

      <section>
        <h2>Tracking Companies</h2>
        <ul id="companiesList" class="companies"></ul>
      </section>

      <section id="cookieWarning" class="warning hidden">
        ⚠️ This site uses many cookies
      </section>

      <section class="toggles">
        <label class="toggle">
          <input type="checkbox" id="trackerBlocking" />
          <span>Tracker blocking</span>
        </label>
        <label class="toggle">
          <input type="checkbox" id="fingerprintProtection" />
          <span>Fingerprint protection</span>
        </label>
        <label class="toggle">
          <input type="checkbox" id="cookieWarnings" />
          <span>Cookie warnings</span>
        </label>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
