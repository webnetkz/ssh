<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Public IP</title>
    <style>
      :root {
        color-scheme: light;
      }

      html,
      body {
        margin: 0;
        min-width: 260px;
        background: #f8fafc;
        color: #0f172a;
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      }

      .container {
        padding: 14px;
      }

      #ip {
        padding: 9px 10px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        background: #ffffff;
        font-size: 16px;
        line-height: 1.2;
        letter-spacing: 0.02em;
        user-select: all;
        text-align: left;
        min-height: 19px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div id="ip"></div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
