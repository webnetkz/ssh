<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Clean Site</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        min-width: 300px;
        font: 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f7fb;
        color: #111827;
      }

      main {
        padding: 16px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 16px;
      }

      p {
        margin: 0 0 12px;
        color: #374151;
      }

      button {
        width: 100%;
        border: 0;
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 14px;
        font-weight: 600;
        color: #fff;
        background: #0f766e;
        cursor: pointer;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.65;
      }

      #status {
        margin-top: 12px;
        font-size: 12px;
        color: #1f2937;
        min-height: 18px;
      }

      #status.error {
        color: #b91c1c;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Clean Site</h1>
      <p>Remove data for the current website only.</p>
      <button id="clearBtn" type="button">Clear Current Site</button>
      <div id="status" role="status" aria-live="polite"></div>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
